<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>API Test</title>
<style>body{font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto}pre{background:#f0f0f0;padding:16px;border-radius:8px;overflow-x:auto;font-size:0.85rem;white-space:pre-wrap}.box{padding:12px;margin:8px 0;border-radius:8px;font-size:0.9rem}.green{background:#dfd;border:1px solid #4a4}.red{background:#fdd;border:1px solid #d44}button{padding:12px 24px;border:none;border-radius:8px;background:#d4654a;color:#fff;font-size:1rem;cursor:pointer;margin:4px}input{padding:12px;border:2px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;margin-bottom:8px;font-size:1rem}</style>
</head>
<body>
<h2>API Ninjas Raw Test</h2>
<input id="q" value="bell pepper" placeholder="Suchbegriff (englisch)">
<button onclick="testApi()">Testen</button>
<button onclick="document.getElementById('q').value='chicken breast';testApi()">Chicken</button>
<button onclick="document.getElementById('q').value='rice';testApi()">Rice</button>
<button onclick="document.getElementById('q').value='apple';testApi()">Apple</button>
<div id="out"></div>

<script>
async function testApi() {
  var q = document.getElementById('q').value;
  var out = document.getElementById('out');
  out.innerHTML = '<div class="box green">Suche: ' + q + '...</div>';

  try {
    var resp = await fetch('https://api.api-ninjas.com/v1/nutrition?query=' + encodeURIComponent(q), {
      headers: { 'X-Api-Key': 'kD3oZTXWoQYaagePvLy6MdU6zM8yjwwHUnAp2lsL' }
    });

    out.innerHTML += '<div class="box green">Status: ' + resp.status + '</div>';

    var data = await resp.json();
    out.innerHTML += '<div class="box green">Anzahl Ergebnisse: ' + (Array.isArray(data) ? data.length : 'kein Array') + '</div>';

    if (Array.isArray(data) && data.length > 0) {
      data.forEach(function(item, i) {
        out.innerHTML += '<h3>Item ' + (i+1) + ': ' + item.name + '</h3>';
        out.innerHTML += '<pre>' + JSON.stringify(item, null, 2) + '</pre>';
        out.innerHTML += '<div class="box green">calories = ' + item.calories + ' (Typ: ' + typeof item.calories + ')</div>';
      });
    } else {
      out.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
    }
  } catch(e) {
    out.innerHTML += '<div class="box red">Fehler: ' + e.message + '</div>';
  }
}
</script>
</body>
</html>
