<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Suchtest v2</title></head>
<body style="font-family:system-ui;padding:20px;max-width:500px;margin:auto">
<h3>Aufgetischt Suchtest v2</h3>
<p style="font-size:13px;color:#888">Tippt erst nach 800ms Pause bei OFF an. Bricht alte Anfragen ab.</p>
<input id="q" type="text" placeholder="Mind. 3 Zeichen..." style="width:100%;padding:12px;font-size:16px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box" oninput="doSearch(this.value)">
<div id="results" style="margin-top:16px"></div>
<script>
var timer, abortCtrl;
function doSearch(q) {
  clearTimeout(timer);
  var r = document.getElementById('results');
  if (q.length < 3) { r.innerHTML = '<p style="color:#999">Mind. 3 Zeichen eingeben, dann 1 Sek. warten</p>'; return; }
  r.innerHTML = '<b>Warte auf Tipp-Pause...</b>';
  timer = setTimeout(function() {
    if (abortCtrl) try { abortCtrl.abort(); } catch(e) {}
    abortCtrl = new AbortController();
    r.innerHTML = '<b>Suche bei Open Food Facts...</b>';
    fetch('https://world.openfoodfacts.org/cgi/search.pl?search_terms=' + encodeURIComponent(q) + '&search_simple=1&action=process&json=1&page_size=5&fields=product_name,brands,nutriments&lc=de', { signal: abortCtrl.signal })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      var p = data.products || [];
      var html = '<b>' + p.length + ' Produkte gefunden:</b><br>';
      p.forEach(function(x) {
        html += '🏷️ ' + (x.product_name||'?') + ' (' + (x.brands||'') + ') - ' + Math.round(x.nutriments?.['energy-kcal_100g']||0) + ' kcal<br>';
      });
      if (!p.length) html += '<i>Keine Ergebnisse für "' + q + '"</i>';
      r.innerHTML = html;
    })
    .catch(function(err) {
      if (err.name === 'AbortError') return;
      r.innerHTML = '<span style="color:red">FEHLER: ' + err.message + '</span>';
    });
  }, 800);
}
</script>
</body></html>
