<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Suchtest</title></head>
<body style="font-family:system-ui;padding:20px;max-width:500px;margin:auto">
<h3>Aufgetischt Suchtest</h3>
<input id="q" type="text" placeholder="Suchbegriff eingeben..." style="width:100%;padding:12px;font-size:16px;border:1px solid #ccc;border-radius:8px" oninput="doSearch(this.value)">
<div id="results" style="margin-top:16px"></div>

<script>
var LOCAL_FOODS = [
  ['Apfel',52,0.3,13.8,0.2,2.4,'🍎'],['Banane',89,1.1,22.8,0.3,2.6,'🍌'],
  ['Hähnchenbrust',165,31.0,0,3.6,0,'🍗'],['Reis gekocht',130,2.7,28.2,0.3,0.4,'🍚'],
  ['Nutella',539,6.3,57.5,31.8,0,'🍫'],['Chips',536,6.5,50.0,35.0,4.0,'🥔'],
];

var timer;
function doSearch(q) {
  clearTimeout(timer);
  var r = document.getElementById('results');
  if (q.length < 2) { r.innerHTML = '<p style="color:#999">Mind. 2 Zeichen</p>'; return; }

  // Lokale Ergebnisse
  var local = LOCAL_FOODS.filter(function(f) { return f[0].toLowerCase().includes(q.toLowerCase()); });
  var html = '<b>Lokal (' + local.length + '):</b><br>';
  local.forEach(function(f) { html += f[6] + ' ' + f[0] + ' - ' + f[1] + ' kcal<br>'; });

  html += '<br><b>Open Food Facts:</b> Lade...<br>';
  r.innerHTML = html;

  timer = setTimeout(function() {
    var url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms=' + encodeURIComponent(q) + '&search_simple=1&action=process&json=1&page_size=5&fields=product_name,brands,nutriments&lc=de';
    html += '<small>URL: ' + url + '</small><br>';

    fetch(url).then(function(resp) {
      html += 'Status: ' + resp.status + '<br>';
      return resp.json();
    }).then(function(data) {
      var products = data.products || [];
      html = html.replace('Lade...', products.length + ' Produkte gefunden');
      products.forEach(function(p) {
        html += '🏷️ ' + (p.product_name||'?') + ' (' + (p.brands||'') + ') - ' + Math.round(p.nutriments?.['energy-kcal_100g']||0) + ' kcal<br>';
      });
      r.innerHTML = html;
    }).catch(function(err) {
      html = html.replace('Lade...', '<span style="color:red">FEHLER: ' + err.message + '</span>');
      r.innerHTML = html;
    });
  }, 500);
}
</script>
</body></html>
