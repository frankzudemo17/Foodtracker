<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NährWert - Debug Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; background: #faf5f0; }
h1 { font-size: 1.3rem; margin-bottom: 20px; }
.log { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 12px; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }
.log.ok { border-color: #4a4; color: #262; background: #dfd; }
.log.err { border-color: #d44; color: #622; background: #fdd; }
.log.info { border-color: #46a; color: #236; background: #def; }
input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 8px; font-size: 1rem; }
button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #d4654a; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
button:hover { background: #c05a42; }
#logs { margin-bottom: 20px; }
</style>
</head>
<body>
<h1>🔧 NährWert Debug Test</h1>
<div id="logs"></div>

<input type="email" id="email" placeholder="E-Mail">
<input type="password" id="password" placeholder="Passwort (min. 6 Zeichen)">
<input type="text" id="name" placeholder="Name">
<button onclick="testRegister()">Test: Registrieren</button>
<button onclick="testLogin()">Test: Anmelden</button>

<script>
const SUPABASE_URL = 'https://pmsapistypygnrdbxokq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtc2FwaXN0eXB5Z25yZGJ4b2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTg5NDEsImV4cCI6MjA4ODk3NDk0MX0.uAK5-RZYpMUgOj20nEx75vlc_cjvXydnWTLEmPbHS7o';

let supabase;

function log(msg, type = 'info') {
  const div = document.createElement('div');
  div.className = 'log ' + type;
  div.textContent = msg;
  document.getElementById('logs').appendChild(div);
}

// Test 1: Library loaded?
if (window.supabase && window.supabase.createClient) {
  log('✅ Supabase Library geladen', 'ok');
} else {
  log('❌ Supabase Library NICHT geladen! CDN blockiert?', 'err');
}

// Test 2: Client erstellen
try {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  log('✅ Supabase Client erstellt', 'ok');
} catch (e) {
  log('❌ Client Fehler: ' + e.message, 'err');
}

// Test 3: Verbindung testen
async function testConnection() {
  try {
    const { data, error } = await supabase.auth.getSession();
    if (error) {
      log('❌ Verbindung Fehler: ' + error.message, 'err');
    } else {
      log('✅ Verbindung zu Supabase OK (Session: ' + (data.session ? 'aktiv' : 'keine') + ')', 'ok');
    }
  } catch (e) {
    log('❌ Verbindung Fehler: ' + e.message, 'err');
  }
}
testConnection();

// Test 4: Profiles Tabelle
async function testTable() {
  try {
    const { data, error } = await supabase.from('profiles').select('id').limit(1);
    if (error) {
      log('❌ Profiles Tabelle Fehler: ' + error.message + ' (Code: ' + error.code + ')', 'err');
    } else {
      log('✅ Profiles Tabelle erreichbar', 'ok');
    }
  } catch (e) {
    log('❌ Tabellen Fehler: ' + e.message, 'err');
  }
}
testTable();

async function testRegister() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const name = document.getElementById('name').value;
  log('📤 Versuche Registrierung: ' + email + '...', 'info');

  try {
    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { display_name: name || 'Nutzer' } }
    });
    if (error) {
      log('❌ Registrierung Fehler: ' + error.message + ' (Status: ' + error.status + ')', 'err');
    } else {
      log('✅ Registrierung OK! User ID: ' + (data.user?.id || 'unbekannt') + '\nSession: ' + (data.session ? 'JA' : 'NEIN (E-Mail Bestätigung nötig?)'), 'ok');
    }
  } catch (e) {
    log('❌ Registrierung Exception: ' + e.message, 'err');
  }
}

async function testLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  log('📤 Versuche Login: ' + email + '...', 'info');

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      log('❌ Login Fehler: ' + error.message + ' (Status: ' + error.status + ')', 'err');
    } else {
      log('✅ Login OK! User: ' + data.user?.email + '\nSession aktiv: JA', 'ok');
    }
  } catch (e) {
    log('❌ Login Exception: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
