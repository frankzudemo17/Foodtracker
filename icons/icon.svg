<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Karierte Tischdecke, diagonal -->
    <pattern id="check" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse" patternTransform="rotate(45 0 0)">
      <rect width="64" height="64" fill="#E8EDE2"/>
      <rect x="32" y="0" width="32" height="32" fill="#DCE3D5"/>
      <rect x="0" y="32" width="32" height="32" fill="#DCE3D5"/>
    </pattern>
    <!-- Vignette für dezente Tiefe -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#1C2014" stop-opacity="0.14"/>
    </radialGradient>
    <!-- Cliper für Rundecken auf Pattern -->
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Base -->
    <rect width="512" height="512" fill="#E8EDE2"/>
    <!-- Karo-Muster -->
    <rect width="512" height="512" fill="url(#check)"/>
    <!-- Vignette -->
    <rect width="512" height="512" fill="url(#vignette)"/>

    <!-- Gabel links, leicht geneigt hinter dem Teller -->
    <g transform="translate(92 180) rotate(-10 24 90)">
      <rect x="0" y="0" width="7" height="46" rx="2.5" fill="#A34509"/>
      <rect x="13" y="0" width="7" height="46" rx="2.5" fill="#A34509"/>
      <rect x="26" y="0" width="7" height="46" rx="2.5" fill="#A34509"/>
      <rect x="39" y="0" width="7" height="46" rx="2.5" fill="#A34509"/>
      <path d="M -2 44 L 48 44 L 42 60 L 4 60 Z" fill="#A34509"/>
      <rect x="18" y="60" width="12" height="128" rx="3" fill="#A34509"/>
      <ellipse cx="24" cy="190" rx="9" ry="6" fill="#A34509"/>
    </g>

    <!-- Messer rechts, gespiegelt geneigt -->
    <g transform="translate(380 178) rotate(10 18 95)">
      <path d="M 6 0 L 28 0 Q 32 0 32 6 L 32 92 Q 32 96 28 96 L 6 96 Z" fill="#A34509"/>
      <rect x="10" y="96" width="16" height="96" rx="3" fill="#A34509"/>
      <ellipse cx="18" cy="194" rx="9" ry="6" fill="#A34509"/>
    </g>

    <!-- Teller-Schatten -->
    <ellipse cx="256" cy="410" rx="140" ry="14" fill="#1C2014" fill-opacity="0.14"/>

    <!-- Teller — Outer Rim -->
    <circle cx="256" cy="256" r="150" fill="#FDFBF7" stroke="#A34509" stroke-width="10"/>
    <!-- Innerer Dekor-Ring -->
    <circle cx="256" cy="256" r="108" fill="none" stroke="#A34509" stroke-width="2" opacity="0.4"/>
    <!-- Zweiter feiner Ring -->
    <circle cx="256" cy="256" r="92" fill="none" stroke="#A34509" stroke-width="1" opacity="0.25"/>
    <!-- Subtile Licht-Reflexion oben-links -->
    <ellipse cx="218" cy="188" rx="44" ry="10" fill="#FFFFFF" fill-opacity="0.55"/>
  </g>
</svg>
